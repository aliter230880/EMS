<!DOCTYPE html><html><head><meta charset=UTF-8><title>FOREO Read Test</title></head><body><h1>FOREO BEAR - Read Characteristics</h1><button onclick=connect()>Connect</button><button onclick=readAll() disabled id=readBtn>Read All</button><button onclick=testWithInit() disabled id=testBtn>Test with Init</button><div id=log style="background:#000;color:#0f0;padding:10px;font-family:monospace;height:500px;overflow-y:auto"></div><script>let device,srv,chars={};const readChars=["00000a00","00000a04","00000a05","00000a06","00000a07","00000a0a","00000a0d","00000a0f","00000a10"];const writeChars=["0000fff1","0000fff2","00000a08"];function log(m){document.getElementById("log").innerHTML+=m+"<br>";document.getElementById("log").scrollTop=999999}async function connect(){try{device=await navigator.bluetooth.requestDevice({filters:[{name:"BEAR"}],optionalServices:["0000fff0-0000-1000-8000-00805f9b34fb"]});const server=await device.gatt.connect();srv=await server.getPrimaryService("0000fff0-0000-1000-8000-00805f9b34fb");log("Connected!");for(let id of readChars){try{chars[id]=await srv.getCharacteristic(id+"-0000-1000-8000-00805f9b34fb");log("Got read char: "+id)}catch(e){log("Skip "+id)}}for(let id of writeChars){try{chars[id]=await srv.getCharacteristic(id+"-0000-1000-8000-00805f9b34fb");log("Got write char: "+id)}catch(e){log("Skip "+id)}}document.getElementById("readBtn").disabled=false;document.getElementById("testBtn").disabled=false}catch(e){log("Error: "+e)}}async function readAll(){log("=== READING ALL ===");for(let id of readChars){if(chars[id]){try{const val=await chars[id].readValue();const bytes=new Uint8Array(val.buffer);const hex=Array.from(bytes).map(b=>b.toString(16).padStart(2,"0")).join("-");log(id+": "+hex)}catch(e){log(id+": READ ERROR")}}}}async function testWithInit(){log("=== TEST WITH INIT ===");await readAll();await new Promise(r=>setTimeout(r,500));log("Sending Level 1...");await chars["0000fff1"].writeValue(new Uint8Array([100,23,1,128]));await new Promise(r=>setTimeout(r,2000));log("Done! Feel impulse?")}</script></body></html>
