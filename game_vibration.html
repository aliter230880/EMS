<!DOCTYPE html><html><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>EMS Runner (Phone Vibration)</title><style>body{font-family:Arial;margin:0;padding:20px;background:#1a1a2e;color:#fff}h1{text-align:center}#game{width:100%;max-width:400px;margin:0 auto;background:#16213e;padding:20px;border-radius:10px}.btn{width:100%;padding:15px;margin:10px 0;font-size:18px;border:none;border-radius:5px;cursor:pointer;background:#0f3460;color:#fff}.btn:active{background:#533483}.status{padding:15px;margin:10px 0;border-radius:5px;background:#0a2342;text-align:center}</style></head><body><div id=game><h1>EMS Runner</h1><div class=status id=status>Ready</div><button class=btn onclick=start()>START</button><button class=btn onclick=stop()>STOP</button></div><script>let running=false;async function start(){if(!navigator.vibrate){alert("Vibration not supported");return}running=true;document.getElementById("status").textContent="Running...";while(running){navigator.vibrate(200);await sleep(1000)}}function stop(){running=false;document.getElementById("status").textContent="Stopped"}function sleep(ms){return new Promise(r=>setTimeout(r,ms))}</script></body></html>
